<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web服务器集群负载均衡模拟</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-row {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            color: #aaa;
            font-size: 14px;
        }

        input[type="number"] {
            width: 80px;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-start {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        .btn-start:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff4757, #cc0033);
            color: #fff;
        }

        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 71, 87, 0.4);
        }

        .canvas-container {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        canvas {
            width: 100%;
            height: 400px;
            border-radius: 10px;
            background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
        }

        .stats-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }

        .log-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            height: 150px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-time {
            color: #666;
        }

        .log-message {
            color: #ccc;
        }

        .log-success { color: #4ade80; }
        .log-info { color: #60a5fa; }
        .log-warning { color: #fbbf24; }
        .log-error { color: #f87171; }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
        }

        .status-online { background: #4ade80; }
        .status-busy { background: #fbbf24; }
        .status-offline { background: #f87171; }

        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .connection-connected {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .connection-disconnected {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.3);
        }
    </style>
</head>
<body>
    <div class="connection-status" id="connectionStatus">
        <span class="status-indicator status-offline"></span> 未连接
    </div>

    <div class="container">
        <h1>Web服务器集群负载均衡模拟</h1>
        <p class="subtitle">调度算法: 时间片轮转 (Round Robin) | 实时可视化多线程并发处理</p>

        <div class="control-panel">
            <div class="control-row">
                <div class="control-group">
                    <label>服务器数量:</label>
                    <input type="number" id="numServers" value="3" min="1" max="8">
                </div>
                <div class="control-group">
                    <label>请求总数:</label>
                    <input type="number" id="numRequests" value="20" min="5" max="100">
                </div>
                <div class="control-group">
                    <label>请求间隔(秒):</label>
                    <input type="number" id="interval" value="0.5" min="0.1" max="2.0" step="0.1">
                </div>
            </div>
            <div class="control-row">
                <button class="btn-start" id="btnStart" onclick="startSimulation()">开始模拟</button>
                <button class="btn-stop" id="btnStop" onclick="stopSimulation()" disabled>停止模拟</button>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="simulationCanvas"></canvas>
        </div>

        <div class="stats-panel">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">总请求数</div>
                    <div class="stat-value" id="totalRequests">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">已完成</div>
                    <div class="stat-value" id="completedRequests">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">处理中</div>
                    <div class="stat-value" id="processingRequests">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">丢弃请求</div>
                    <div class="stat-value" id="droppedRequests">0</div>
                </div>
            </div>
        </div>

        <div class="log-panel" id="logPanel">
            <div class="log-entry">
                <span class="log-time">[系统]</span>
                <span class="log-message">等待连接服务器...</span>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        const canvas = document.getElementById('simulationCanvas');
        const ctx = canvas.getContext('2d');
        let socket;
        let animationId;
        let isRunning = false;

        // 模拟数据
        const simulationData = {
            servers: [],
            requests: [],
            particles: [],  // 流动动画粒子
            stats: {
                total: 0,
                completed: 0,
                processing: 0,
                dropped: 0
            }
        };

        // 配置
        const config = {
            serverWidth: 120,
            serverHeight: 100,
            serverGap: 30,
            colors: {
                idle: '#4ade80',
                busy: '#fbbf24',
                offline: '#6b7280',
                request: '#00d4ff',
                particle: '#7c3aed'
            }
        };

        // 初始化Canvas尺寸
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 连接WebSocket
        function connectSocket() {
            socket = io();

            socket.on('connect', () => {
                updateConnectionStatus(true);
                log('已连接到服务器', 'success');
            });

            socket.on('disconnect', () => {
                updateConnectionStatus(false);
                log('与服务器断开连接', 'error');
            });

            // 监听服务器状态更新
            socket.on('server_status', (data) => {
                updateServerStatus(data);
            });

            // 新请求到达
            socket.on('new_request', (data) => {
                simulationData.requests.push({
                    ...data,
                    x: 0,
                    y: 50,
                    targetServer: null
                });
                simulationData.stats.total++;
                updateStats();
                log(`新请求 ${data.id} 到达 (IP: ${data.ip})`, 'info');
            });

            // 请求分配
            socket.on('request_assigned', (data) => {
                const request = simulationData.requests.find(r => r.id === data.request.id);
                if (request) {
                    request.targetServer = data.request.server;
                    createParticle(request, data.request.server);
                }
                log(`请求 ${data.request.id} 分配给 Server-${data.request.server} (${data.algorithm})`, 'success');
            });

            // 请求入队
            socket.on('request_queued', (data) => {
                simulationData.stats.processing++;
                updateStats();
            });

            // 请求进度
            socket.on('request_progress', (data) => {
                const server = simulationData.servers.find(s => s.id === data.server_id);
                if (server) {
                    server.progress = data.progress;
                }
            });

            // 请求完成
            socket.on('request_complete', (data) => {
                simulationData.stats.completed++;
                simulationData.stats.processing--;
                updateStats();
                log(`Server-${data.server_id} 完成请求 ${data.request.id} (响应时间: ${data.response_time.toFixed(3)}s)`, 'success');
            });

            // 模拟完成
            socket.on('simulation_complete', (data) => {
                isRunning = false;
                updateButtons();
                log('模拟完成!', 'success');
            });
        }

        // 更新连接状态显示
        function updateConnectionStatus(connected) {
            const status = document.getElementById('connectionStatus');
            if (connected) {
                status.innerHTML = '<span class="status-indicator status-online"></span> 已连接';
                status.className = 'connection-status connection-connected';
            } else {
                status.innerHTML = '<span class="status-indicator status-offline"></span> 未连接';
                status.className = 'connection-status connection-disconnected';
            }
        }

        // 更新服务器状态
        function updateServerStatus(data) {
            let server = simulationData.servers.find(s => s.id === data.server_id);
            if (!server) {
                server = {
                    id: data.server_id,
                    status: 'idle',
                    progress: 0,
                    processed: 0,
                    queue_size: 0,
                    current_request: null
                };
                simulationData.servers.push(server);
            }
            Object.assign(server, data);
            server.status = data.status;
        }

        // 创建流动粒子动画
        function createParticle(request, serverId) {
            const server = simulationData.servers.find(s => s.id === serverId);
            if (!server) return;

            const serverX = calculateServerX(serverId);
            const serverY = canvas.height / 2;

            simulationData.particles.push({
                x: 50,
                y: 50,
                targetX: serverX,
                targetY: serverY,
                progress: 0,
                requestId: request.id,
                serverId: serverId,
                speed: 0.05
            });
        }

        // 计算服务器X位置
        function calculateServerX(serverId) {
            const totalWidth = simulationData.servers.length * (config.serverWidth + config.serverGap);
            const startX = (canvas.width - totalWidth) / 2;
            return startX + serverId * (config.serverWidth + config.serverGap) + config.serverWidth / 2;
        }

        // 绘制函数
        function draw() {
            // 清空画布
            ctx.fillStyle = 'rgba(13, 17, 23, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制标题
            ctx.fillStyle = '#fff';
            ctx.font = '14px sans-serif';
            ctx.fillText('负载均衡器', 20, 30);

            // 绘制负载均衡器图标
            drawLoadBalancer();

            // 绘制请求源
            drawRequestSource();

            // 绘制服务器
            simulationData.servers.forEach(server => {
                drawServer(server);
            });

            // 绘制粒子动画
            updateAndDrawParticles();

            // 绘制连接线
            drawConnections();

            animationId = requestAnimationFrame(draw);
        }

        // 绘制负载均衡器
        function drawLoadBalancer() {
            const x = 150;
            const y = canvas.height / 2 - 40;

            // 绘制盒子
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, 100, 80);

            // 填充渐变
            const gradient = ctx.createLinearGradient(x, y, x + 100, y + 80);
            gradient.addColorStop(0, 'rgba(0, 212, 255, 0.1)');
            gradient.addColorStop(1, 'rgba(0, 212, 255, 0.05)');
            ctx.fillStyle = gradient;
            ctx.fillRect(x, y, 100, 80);

            // 文字
            ctx.fillStyle = '#00d4ff';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Load', x + 50, y + 35);
            ctx.fillText('Balancer', x + 50, y + 55);
            ctx.textAlign = 'left';

            // 绘制RR算法指示器
            if (isRunning && simulationData.servers.length > 0) {
                const currentIndex = simulationData.servers.findIndex(s => s.status !== 'offline');
                if (currentIndex >= 0) {
                    const serverX = calculateServerX(currentIndex);
                    ctx.strokeStyle = '#00d4ff';
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(x + 100, y + 40);
                    ctx.lineTo(serverX - config.serverWidth / 2, y + 40);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }
        }

        // 绘制请求源
        function drawRequestSource() {
            const x = 20;
            const y = canvas.height / 2 - 30;

            ctx.fillStyle = '#666';
            ctx.font = '12px sans-serif';
            ctx.fillText('客户端', x, y - 10);

            // 绘制客户端图标
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath();
            ctx.arc(x + 30, y + 15, 25, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#888';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(x + 30, y + 15, 25, 0, Math.PI * 2);
            ctx.stroke();
        }

        // 绘制服务器
        function drawServer(server) {
            const x = calculateServerX(server.id) - config.serverWidth / 2;
            const y = canvas.height / 2 - config.serverHeight / 2;

            // 服务器颜色
            let color = config.colors.idle;
            if (server.status === 'busy') color = config.colors.busy;
            if (server.status === 'offline') color = config.colors.offline;

            // 服务器盒子
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, config.serverWidth, config.serverHeight);

            // 渐变填充
            const gradient = ctx.createLinearGradient(x, y, x, y + config.serverHeight);
            gradient.addColorStop(0, color + '20');
            gradient.addColorStop(1, color + '10');
            ctx.fillStyle = gradient;
            ctx.fillRect(x, y, config.serverWidth, config.serverHeight);

            // 服务器ID
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`Server-${server.id}`, x + config.serverWidth / 2, y + 25);

            // 状态指示
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x + 15, y + 25, 5, 0, Math.PI * 2);
            ctx.fill();

            // 状态文字
            ctx.fillStyle = '#aaa';
            ctx.font = '12px sans-serif';
            ctx.fillText(server.status.toUpperCase(), x + config.serverWidth / 2, y + 50);

            // 处理进度条
            if (server.status === 'busy' && server.progress > 0) {
                const barY = y + 65;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fillRect(x + 10, barY, config.serverWidth - 20, 8);

                ctx.fillStyle = color;
                ctx.fillRect(x + 10, barY, (config.serverWidth - 20) * (server.progress / 100), 8);

                // 进度文字
                ctx.fillStyle = '#fff';
                ctx.font = '10px sans-serif';
                ctx.fillText(`${Math.round(server.progress)}%`, x + config.serverWidth / 2, barY + 15);
            }

            // 队列长度
            if (server.queue_size > 0) {
                ctx.fillStyle = '#fbbf24';
                ctx.font = '11px sans-serif';
                ctx.fillText(`Queue: ${server.queue_size}`, x + config.serverWidth / 2, y + config.serverHeight - 8);
            }

            // 已处理数
            ctx.fillStyle = '#4ade80';
            ctx.font = '11px sans-serif';
            ctx.fillText(`Done: ${server.processed || 0}`, x + config.serverWidth / 2, y + config.serverHeight + 15);

            ctx.textAlign = 'left';
        }

        // 更新和绘制粒子
        function updateAndDrawParticles() {
            simulationData.particles = simulationData.particles.filter(p => {
                // 更新位置
                p.progress += p.speed;

                const currentX = p.x + (p.targetX - p.x) * p.progress;
                const currentY = p.y + (p.targetY - p.y) * p.progress;

                // 绘制粒子
                ctx.fillStyle = config.colors.particle;
                ctx.beginPath();
                ctx.arc(currentX, currentY, 6, 0, Math.PI * 2);
                ctx.fill();

                // 绘制光晕
                const gradient = ctx.createRadialGradient(currentX, currentY, 0, currentX, currentY, 12);
                gradient.addColorStop(0, 'rgba(124, 58, 237, 0.5)');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(currentX, currentY, 12, 0, Math.PI * 2);
                ctx.fill();

                return p.progress < 1;
            });
        }

        // 绘制连接线
        function drawConnections() {
            // 从客户端到负载均衡器
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(70, canvas.height / 2 - 15);
            ctx.lineTo(150, canvas.height / 2);
            ctx.stroke();
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalRequests').textContent = simulationData.stats.total;
            document.getElementById('completedRequests').textContent = simulationData.stats.completed;
            document.getElementById('processingRequests').textContent = simulationData.stats.processing;
            document.getElementById('droppedRequests').textContent = simulationData.stats.dropped;
        }

        // 日志记录
        function log(message, type = 'info') {
            const panel = document.getElementById('logPanel');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${message}</span>`;
            panel.appendChild(entry);
            panel.scrollTop = panel.scrollHeight;

            // 限制日志条目数
            while (panel.children.length > 50) {
                panel.removeChild(panel.firstChild);
            }
        }

        // 更新按钮状态
        function updateButtons() {
            document.getElementById('btnStart').disabled = isRunning;
            document.getElementById('btnStop').disabled = !isRunning;
        }

        // 开始模拟
        function startSimulation() {
            const numServers = parseInt(document.getElementById('numServers').value);
            const numRequests = parseInt(document.getElementById('numRequests').value);
            const interval = parseFloat(document.getElementById('interval').value);

            // 重置数据
            simulationData.servers = [];
            simulationData.requests = [];
            simulationData.particles = [];
            simulationData.stats = { total: 0, completed: 0, processing: 0, dropped: 0 };
            updateStats();

            // 初始化服务器
            for (let i = 0; i < numServers; i++) {
                simulationData.servers.push({
                    id: i,
                    status: 'idle',
                    progress: 0,
                    processed: 0,
                    queue_size: 0,
                    current_request: null
                });
            }

            isRunning = true;
            updateButtons();
            log('模拟开始...', 'info');

            socket.emit('start_simulation', {
                num_servers: numServers,
                num_requests: numRequests,
                interval: interval
            });
        }

        // 停止模拟
        function stopSimulation() {
            isRunning = false;
            updateButtons();
            socket.emit('stop_simulation');
            log('模拟已停止', 'warning');
        }

        // 初始化
        connectSocket();
        draw();
    </script>
</body>
</html>
